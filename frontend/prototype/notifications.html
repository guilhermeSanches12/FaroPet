<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="img/iconWebLogo.png" type="image/png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notificações - Faro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: { brand: { orange: '#F97316', 'orange-dark': '#EA580C', brown: '#451a03', 'brown-mid': '#7C3505', beige: '#FEF3C7', light: '#F4F4F0' } },
            fontFamily: { sans: ['Inter', 'sans-serif'] },
          },
        },
      };
    </script>
  </head>
  <body class="bg-brand-light font-sans text-gray-900 min-h-screen">

    <div id="desktop-sidebar"></div>

    <div class="lg:ml-64">
      <div class="bg-white border-b border-gray-100 shadow-sm sticky top-0 z-40">
        <div class="flex items-center px-4 lg:px-8 py-4">
          <a href="dashboard.html" class="lg:hidden w-9 h-9 rounded-full bg-gray-100 flex items-center justify-center flex-shrink-0 mr-3" aria-label="Voltar">
            <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
          </a>
          <div class="flex-1">
            <h1 class="text-lg lg:text-2xl font-bold text-gray-900">Notificações</h1>
            <p class="text-xs text-gray-400 hidden lg:block">Lembretes de vacinas e consultas</p>
          </div>
          <span id="notif-count-badge" class="hidden px-2.5 py-0.5 rounded-full text-xs font-semibold text-white" style="background:#F97316;"></span>
        </div>
      </div>

      <main class="px-4 sm:px-5 lg:px-8 py-5 pb-28 lg:pb-10 max-w-4xl">

        <div id="notif-list" class="space-y-3"></div>

        <div id="notif-empty" class="hidden text-center py-16 px-6 bg-white rounded-2xl border border-gray-100 shadow-sm">
          <svg class="w-14 h-14 mx-auto mb-4 text-gray-200" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
          </svg>
          <p class="text-sm font-semibold text-gray-500 mb-1">Tudo em dia!</p>
          <p class="text-xs text-gray-400">Lembretes de vacinas e consultas aparecerão aqui.</p>
        </div>

      </main>
    </div>

    <div id="bottom-nav"></div>

    <script src="shared.js"></script>
    <script>
      function iconByType(type) {
        var icons = {
          vaccine: '<svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"/></svg>',
          appointment: '<svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5"/></svg>',
          medicine: '<svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9.75 3.104v5.714a2.25 2.25 0 01-.659 1.591L5 14.5M9.75 3.104c-.251.023-.501.05-.75.082m.75-.082a24.301 24.301 0 014.5 0m0 0v5.714c0 .597.237 1.17.659 1.591L19.8 15.3M14.25 3.104c.251.023.501.05.75.082M19.8 15.3l-1.57.393A9.065 9.065 0 0112 15a9.065 9.065 0 00-6.23-.693L5 14.5m14.8.8l1.402 1.402c1.232 1.232.65 3.318-1.067 3.611A48.309 48.309 0 0112 21c-2.773 0-5.491-.235-8.135-.687-1.718-.293-2.3-2.379-1.067-3.61L5 14.5"/></svg>',
          info: '<svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M11.25 11.25l.041-.02a.75.75 0 011.063.852l-.708 2.836a.75.75 0 001.063.853l.041-.021M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9-3.75h.008v.008H12V8.25z"/></svg>',
        };
        return icons[type] || icons.info;
      }

      function colorByType(type) {
        return { vaccine: '#F97316', appointment: '#7C3505', medicine: '#16A34A', info: '#6B7280' }[type] || '#6B7280';
      }
      function bgByType(type) {
        return { vaccine: '#FFF7ED', appointment: '#FEF3C7', medicine: '#DCFCE7', info: '#F3F4F6' }[type] || '#F3F4F6';
      }

      function loadNotifs() {
        requireAuth();
        renderDesktopSidebar('notifications');
        renderBottomNav('menu');

        var today = todayStr();
        var pets = getFaroPets();
        var notifs = [];

        pets.forEach(function(pet) {
          (pet.vaccines || []).forEach(function(v) {
            if (v.status === 'overdue') {
              notifs.push({ id: 'v-' + v.id, type: 'vaccine', urgent: true,
                title: 'Vacina atrasada', body: v.name + ' de ' + pet.name + ' está atrasada.', date: v.scheduledDate || v.date });
            } else if (v.status === 'pending' || v.status === 'next-dose') {
              notifs.push({ id: 'v-' + v.id, type: 'vaccine', urgent: false,
                title: 'Vacina pendente', body: v.name + ' de ' + pet.name + ' precisa ser agendada.', date: v.scheduledDate || null });
            } else if (v.status === 'scheduled' && v.scheduledDate) {
              var daysUntil = Math.ceil((new Date(v.scheduledDate) - new Date(today)) / 86400000);
              if (daysUntil >= 0 && daysUntil <= 7) {
                notifs.push({ id: 'vs-' + v.id, type: 'vaccine', urgent: daysUntil <= 2,
                  title: daysUntil === 0 ? 'Vacina hoje!' : 'Vacina em ' + daysUntil + ' dia(s)',
                  body: v.name + ' de ' + pet.name, date: v.scheduledDate });
              }
            }
          });

          (pet.appointments || []).forEach(function(a) {
            if (a.date >= today) {
              var daysUntil = Math.ceil((new Date(a.date) - new Date(today)) / 86400000);
              if (daysUntil <= 7) {
                notifs.push({ id: 'a-' + a.id, type: 'appointment', urgent: daysUntil <= 1,
                  title: daysUntil === 0 ? 'Consulta hoje!' : 'Consulta em ' + daysUntil + ' dia(s)',
                  body: a.title + ' — ' + pet.name + (a.location ? ' · ' + a.location : ''), date: a.date });
              }
            }
          });
        });

        var medicines = getFaroMedicines();
        medicines.forEach(function(m) {
          var isActive = !m.endDate || m.endDate >= today;
          if (isActive && m.time) {
            notifs.push({ id: 'med-' + m.id, type: 'medicine', urgent: false,
              title: 'Medicamento', body: m.name + ' de ' + (m.petName || '—') + ' · ' + m.dosage + ' · ' + m.time, date: null });
          }
        });

        var saved = getFaroNotifications();
        notifs = notifs.concat(saved.filter(function(s) {
          return !notifs.find(function(n) { return n.id === s.id; });
        }));

        notifs.sort(function(a, b) { return (b.urgent ? 1 : 0) - (a.urgent ? 1 : 0); });

        var list = document.getElementById('notif-list');
        var empty = document.getElementById('notif-empty');
        var badge = document.getElementById('notif-count-badge');

        if (notifs.length === 0) {
          empty.classList.remove('hidden');
          badge.classList.add('hidden');
          return;
        }

        var urgentCount = notifs.filter(function(n) { return n.urgent; }).length;
        if (urgentCount > 0) {
          badge.textContent = urgentCount + ' urgente(s)';
          badge.classList.remove('hidden');
        }

        empty.classList.add('hidden');
        list.innerHTML = notifs.map(function(n) {
          var color = colorByType(n.type);
          var bg = bgByType(n.type);
          return '<div class="bg-white rounded-2xl shadow-sm border ' + (n.urgent ? 'border-orange-200' : 'border-gray-100') + ' p-4 flex items-start gap-4">' +
            '<div class="flex-shrink-0 w-10 h-10 rounded-xl flex items-center justify-center" style="background-color:' + bg + ';color:' + color + ';">' + iconByType(n.type) + '</div>' +
            '<div class="flex-1 min-w-0">' +
              '<p class="text-sm font-semibold text-gray-900 leading-tight">' + escapeHtml(n.title) + '</p>' +
              '<p class="text-xs text-gray-500 mt-0.5 leading-snug">' + escapeHtml(n.body) + '</p>' +
              (n.date ? '<p class="text-xs text-gray-300 mt-1">' + formatDate(n.date) + '</p>' : '') +
            '</div>' +
            (n.urgent ? '<span class="flex-shrink-0 w-2 h-2 rounded-full mt-1.5" style="background-color:' + color + ';"></span>' : '') +
          '</div>';
        }).join('');
      }

      window.addEventListener('load', loadNotifs);
    </script>
  </body>
</html>
