<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="img/iconWebLogo.png" type="image/png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Criar conta - Faro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: { brand: { orange: '#F97316', 'orange-dark': '#EA580C', brown: '#451a03', 'brown-mid': '#7C3505', beige: '#FEF3C7', light: '#F4F4F0' } },
            fontFamily: { sans: ['Inter', 'sans-serif'] },
          },
        },
      };
    </script>
    <style>
      .blob-shape { border-radius: 42% 58% 65% 35% / 44% 38% 62% 56%; }
    </style>
  </head>
  <body class="bg-brand-light font-sans text-gray-900 min-h-screen">
    <div class="min-h-screen flex flex-col md:flex-row">

      <!-- Visual panel — desktop only -->
      <div class="hidden md:flex w-1/2 relative overflow-hidden flex-col justify-center items-center p-12" style="background-color:#FEF3C7;">
        <div class="blob-shape absolute -top-20 -left-20 w-72 h-72 opacity-40" style="background-color:#F97316;"></div>
        <div class="blob-shape absolute -bottom-20 -right-10 w-60 h-60 opacity-30" style="background-color:#92400E;"></div>
        <div class="relative z-10 text-center max-w-md">
          <img src="img/FaroLogo.png" alt="Faro" class="mx-auto mb-6" style="height:48px;width:auto;">
          <h2 class="text-3xl font-bold mb-3" style="color:#451a03;">Comece agora</h2>
          <p class="text-lg text-gray-600 leading-relaxed">Crie sua conta e comece a organizar a saúde do seu pet em minutos.</p>
          <ul class="mt-8 space-y-3 text-left">
            <li class="flex items-center gap-3 text-gray-700">
              <span class="w-6 h-6 rounded-full flex items-center justify-center flex-shrink-0" style="background-color:#F97316;">
                <svg class="w-3 h-3 text-white" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
              </span>
              Cadastre seus pets facilmente
            </li>
            <li class="flex items-center gap-3 text-gray-700">
              <span class="w-6 h-6 rounded-full flex items-center justify-center flex-shrink-0" style="background-color:#F97316;">
                <svg class="w-3 h-3 text-white" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
              </span>
              Controle todas as vacinas
            </li>
            <li class="flex items-center gap-3 text-gray-700">
              <span class="w-6 h-6 rounded-full flex items-center justify-center flex-shrink-0" style="background-color:#F97316;">
                <svg class="w-3 h-3 text-white" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
              </span>
              Agende consultas veterinárias
            </li>
            <li class="flex items-center gap-3 text-gray-700">
              <span class="w-6 h-6 rounded-full flex items-center justify-center flex-shrink-0" style="background-color:#F97316;">
                <svg class="w-3 h-3 text-white" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
              </span>
              Acesse em qualquer dispositivo
            </li>
          </ul>
        </div>
      </div>

      <!-- Form panel -->
      <div class="w-full md:w-1/2 flex flex-col justify-center bg-white min-h-screen px-6 py-12 md:px-12 lg:px-16 relative overflow-hidden">
        <div class="blob-shape absolute -top-12 -right-12 w-40 h-40 md:hidden" style="background-color:#7C3505;opacity:0.12;" aria-hidden="true"></div>

        <div class="w-full max-w-sm mx-auto relative z-10">
          <!-- Logo mobile -->
          <div class="md:hidden flex items-center justify-center mb-8">
            <img src="img/FaroLogo.png" alt="Faro" style="height:38px;width:auto;">
          </div>

          <div class="mb-7">
            <h1 class="text-2xl font-bold text-gray-900 mb-1">Criar sua conta</h1>
            <p class="text-sm text-gray-500">É rápido e gratuito.</p>
          </div>

          <form id="register-form" onsubmit="handleRegister(event)" class="space-y-4">
            <div>
              <label for="name" class="block text-sm font-semibold text-gray-700 mb-1.5">Nome completo</label>
              <input type="text" id="name" required placeholder="João da Silva"
                class="w-full border border-gray-200 rounded-xl px-4 py-3.5 text-sm focus:outline-none bg-gray-50 transition"
                onfocus="this.style.borderColor='#F97316'" onblur="this.style.borderColor=''" />
            </div>
            <div>
              <label for="reg-email" class="block text-sm font-semibold text-gray-700 mb-1.5">E-mail</label>
              <input type="email" id="reg-email" required placeholder="seu@email.com"
                class="w-full border border-gray-200 rounded-xl px-4 py-3.5 text-sm focus:outline-none bg-gray-50 transition"
                onfocus="this.style.borderColor='#F97316'" onblur="this.style.borderColor=''" />
            </div>
            <div>
              <label for="reg-password" class="block text-sm font-semibold text-gray-700 mb-1.5">Senha</label>
              <div class="relative">
                <input type="password" id="reg-password" required minlength="6" placeholder="Mínimo 6 caracteres"
                  class="w-full border border-gray-200 rounded-xl px-4 py-3.5 text-sm focus:outline-none bg-gray-50 pr-12 transition"
                  onfocus="this.style.borderColor='#F97316'" onblur="this.style.borderColor=''" />
                <button type="button" onclick="togglePwd('reg-password')" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                  <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                </button>
              </div>
            </div>
            <div>
              <label for="confirm" class="block text-sm font-semibold text-gray-700 mb-1.5">Confirmar senha</label>
              <div class="relative">
                <input type="password" id="confirm" required placeholder="Repita a senha"
                  class="w-full border border-gray-200 rounded-xl px-4 py-3.5 text-sm focus:outline-none bg-gray-50 pr-12 transition"
                  onfocus="this.style.borderColor='#F97316'" onblur="this.style.borderColor=''" />
                <button type="button" onclick="togglePwd('confirm')" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                  <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                </button>
              </div>
            </div>

            <div id="reg-error" class="hidden text-sm text-red-600 bg-red-50 rounded-xl px-4 py-3"></div>

            <button type="submit" class="w-full text-white font-bold py-3.5 rounded-xl shadow-sm transition-opacity hover:opacity-90 mt-2" style="background-color:#F97316;">
              Criar conta
            </button>
          </form>

          <div class="mt-6 text-center">
            <p class="text-sm text-gray-500">
              Já tem conta?
              <a href="login.html" class="font-semibold hover:underline ml-1" style="color:#F97316;">Fazer login</a>
            </p>
          </div>
        </div>
      </div>
    </div>

    <script src="shared.js"></script>
    <script>
      function togglePwd(inputId) {
        var input = document.getElementById(inputId);
        input.type = input.type === 'password' ? 'text' : 'password';
      }

      function handleRegister(e) {
        e.preventDefault();
        var name     = document.getElementById('name').value.trim();
        var email    = document.getElementById('reg-email').value.trim();
        var pwd      = document.getElementById('reg-password').value;
        var confirm  = document.getElementById('confirm').value;
        var errDiv   = document.getElementById('reg-error');
        errDiv.classList.add('hidden');

        if (pwd !== confirm) {
          errDiv.textContent = 'As senhas não coincidem.';
          errDiv.classList.remove('hidden');
          return;
        }
        // Save user — fresh account: no pets, no vaccines, no appointments
        saveFaroUser({ id: Date.now().toString(), name: name, email: email });
        saveFaroPets([]);
        window.location.href = 'dashboard.html';
      }

      window.addEventListener('load', function() {
        if (getFaroUser()) window.location.href = 'dashboard.html';
      });
    </script>
  </body>
</html>
