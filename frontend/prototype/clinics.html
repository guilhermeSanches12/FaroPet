<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="img/iconWebLogo.png" type="image/png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clínicas - Faro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: { brand: { orange: '#F97316', 'orange-dark': '#EA580C', brown: '#451a03', 'brown-mid': '#7C3505', beige: '#FEF3C7', light: '#F4F4F0' } },
            fontFamily: { sans: ['Inter', 'sans-serif'] },
          },
        },
      };
    </script>
  </head>
  <body class="bg-brand-light font-sans text-gray-900 min-h-screen">

    <div id="desktop-sidebar"></div>

    <div class="lg:ml-64">
      <div class="bg-white border-b border-gray-100 shadow-sm sticky top-0 z-40">
        <div class="flex items-center px-4 lg:px-8 py-4">
          <a href="dashboard.html" class="lg:hidden w-9 h-9 rounded-full bg-gray-100 flex items-center justify-center flex-shrink-0 mr-3" aria-label="Voltar">
            <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
          </a>
          <div class="flex-1">
            <h1 class="text-lg lg:text-2xl font-bold text-gray-900">Clínicas</h1>
            <p class="text-xs text-gray-400 hidden lg:block">Encontre clínicas veterinárias próximas</p>
          </div>
        </div>
      </div>

      <main class="px-4 sm:px-5 lg:px-8 py-5 pb-28 lg:pb-10 max-w-4xl">

        <!-- Search bar -->
        <div class="relative mb-5">
          <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"/>
          </svg>
          <input type="search" id="search-input" placeholder="Buscar clínicas..." oninput="filterClinics()"
            class="w-full pl-10 pr-4 py-3 bg-white rounded-2xl border border-gray-100 shadow-sm text-sm focus:outline-none focus:border-orange-400 sm:max-w-sm" />
        </div>

        <!-- Nearby label -->
        <div class="flex items-center gap-2 mb-4">
          <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z"/>
          </svg>
          <span class="text-sm text-gray-500 font-medium">Clínicas próximas de você</span>
          <span id="clinic-count" class="text-xs text-gray-400"></span>
        </div>

        <!-- Clinic grid -->
        <div id="clinics-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-2 gap-4"></div>

        <!-- Empty -->
        <div id="clinics-empty" class="hidden text-center py-12 px-6 bg-white rounded-2xl border border-gray-100 shadow-sm">
          <svg class="w-12 h-12 mx-auto mb-3 text-gray-200" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 21v-7.5a.75.75 0 01.75-.75h3a.75.75 0 01.75.75V21m-4.5 0H2.36m11.14 0H18m0 0h3.64m-1.39 0V9.349m-16.5 11.65V9.35m0 0a3.001 3.001 0 003.75-.615A2.993 2.993 0 009.75 9.75c.896 0 1.7-.393 2.25-1.016a2.993 2.993 0 002.25 1.016c.896 0 1.7-.393 2.25-1.015a3.001 3.001 0 003.75.614m-16.5 0a3.004 3.004 0 01-.621-4.72L4.318 3.44A1.5 1.5 0 015.378 3h13.243a1.5 1.5 0 011.06.44l1.19 1.189a3 3 0 01-.621 4.72m-13.5 8.65h3.75a.75.75 0 00.75-.75V13.5a.75.75 0 00-.75-.75H6.75a.75.75 0 00-.75.75v3.75c0 .415.336.75.75.75z"/>
          </svg>
          <p class="text-sm font-semibold text-gray-500">Nenhuma clínica encontrada</p>
        </div>

      </main>
    </div>

    <div id="bottom-nav"></div>

    <script src="shared.js"></script>
    <script>
      function filterClinics() {
        var q = (document.getElementById('search-input').value || '').toLowerCase();
        var clinics = DEMO_CLINICS.filter(function(c) {
          return !q || c.name.toLowerCase().includes(q) || c.address.toLowerCase().includes(q);
        });
        var list = document.getElementById('clinics-list');
        var empty = document.getElementById('clinics-empty');
        document.getElementById('clinic-count').textContent = clinics.length + ' clínica(s)';

        if (clinics.length === 0) {
          empty.classList.remove('hidden');
          list.innerHTML = '';
          return;
        }
        empty.classList.add('hidden');

        list.innerHTML = clinics.map(function(c) {
          return '<div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4">' +
            '<div class="flex items-center gap-4">' +
              '<div class="flex-shrink-0 w-16 h-16 rounded-2xl overflow-hidden border border-gray-100">' +
                '<img src="' + c.image + '" alt="' + escapeHtml(c.name) + '" class="w-full h-full object-cover" loading="lazy"/>' +
              '</div>' +
              '<div class="flex-1 min-w-0">' +
                '<p class="font-semibold text-sm text-gray-900 truncate">' + escapeHtml(c.name) + '</p>' +
                '<p class="text-xs text-gray-400 mt-0.5 truncate">' + escapeHtml(c.address) + '</p>' +
                '<div class="flex items-center gap-3 mt-2">' +
                  '<span class="inline-flex items-center gap-1 text-xs text-gray-500">' +
                    '<svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z"/></svg>' +
                    escapeHtml(c.distance) +
                  '</span>' +
                  '<span class="inline-flex items-center gap-1 text-xs text-gray-500">' +
                    '<svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 002.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-.282.376-.769.542-1.21.38a12.035 12.035 0 01-7.143-7.143c-.162-.441.004-.928.38-1.21l1.293-.97c.363-.271.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 00-1.091-.852H4.5A2.25 2.25 0 002.25 4.5v2.25z"/></svg>' +
                    escapeHtml(c.phone) +
                  '</span>' +
                '</div>' +
              '</div>' +
              '<a href="tel:' + escapeHtml(c.phone) + '" class="flex-shrink-0 w-10 h-10 rounded-xl flex items-center justify-center shadow-sm hover:opacity-90 transition-opacity" style="background-color:#F97316;" aria-label="Ligar para ' + escapeHtml(c.name) + '">' +
                '<svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 002.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-.282.376-.769.542-1.21.38a12.035 12.035 0 01-7.143-7.143c-.162-.441.004-.928.38-1.21l1.293-.97c.363-.271.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 00-1.091-.852H4.5A2.25 2.25 0 002.25 4.5v2.25z"/></svg>' +
              '</a>' +
            '</div>' +
          '</div>';
        }).join('');
      }

      window.addEventListener('load', function() {
        requireAuth();
        renderDesktopSidebar('clinics');
        renderBottomNav('clinics');
        filterClinics();
      });
    </script>
  </body>
</html>
