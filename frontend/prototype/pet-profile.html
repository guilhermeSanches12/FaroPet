<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="img/iconWebLogo.png" type="image/png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Perfil do Pet - Faro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: { brand: { orange: '#F97316', 'orange-dark': '#EA580C', brown: '#451a03', 'brown-mid': '#7C3505', beige: '#FEF3C7', light: '#F4F4F0' } },
            fontFamily: { sans: ['Inter', 'sans-serif'] },
          },
        },
      };
    </script>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
  </head>
  <body class="bg-brand-light font-sans text-gray-900 min-h-screen">

    <div id="desktop-sidebar"></div>

    <div class="lg:ml-64">

      <!-- Pet photo hero -->
      <div class="relative w-full" style="height:240px;background:linear-gradient(145deg,#A3510F,#7C3505);">
        <img id="pet-photo" class="w-full h-full object-cover hidden" alt="Foto do pet" />
        <div class="absolute inset-0" style="background:linear-gradient(to top,rgba(0,0,0,0.55) 0%,transparent 55%);"></div>
        <!-- Back button (mobile only) -->
        <a href="dashboard.html" class="lg:hidden absolute top-12 left-5 w-10 h-10 rounded-full bg-white bg-opacity-90 flex items-center justify-center shadow" aria-label="Voltar">
          <svg class="w-5 h-5 text-gray-700" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
        </a>
        <!-- Desktop back button -->
        <a href="dashboard.html" class="hidden lg:flex absolute top-6 left-6 items-center gap-2 text-sm font-semibold text-white opacity-80 hover:opacity-100 transition-opacity" aria-label="Voltar">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
          Todos os pets
        </a>
        <!-- Delete button -->
        <button onclick="confirmDelete()" class="absolute top-12 right-5 lg:top-6 w-10 h-10 rounded-full bg-white bg-opacity-90 flex items-center justify-center shadow" aria-label="Excluir pet">
          <svg class="w-5 h-5 text-red-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
        </button>
        <!-- Pet name overlay -->
        <div class="absolute bottom-4 left-5 right-14">
          <h1 id="pet-name" class="text-2xl font-bold text-white leading-tight"></h1>
          <p id="pet-subtitle" class="text-sm text-white opacity-80 mt-0.5"></p>
        </div>
      </div>

      <main class="px-4 sm:px-5 lg:px-8 py-5 pb-28 lg:pb-10 max-w-4xl">

        <!-- Info chips -->
        <div class="flex flex-wrap gap-2 mb-5">
          <span id="chip-species" class="text-xs font-semibold px-3 py-1.5 rounded-full bg-amber-100 text-amber-800"></span>
          <span id="chip-gender" class="text-xs font-semibold px-3 py-1.5 rounded-full bg-orange-100 text-orange-700"></span>
          <span id="chip-age" class="text-xs font-semibold px-3 py-1.5 rounded-full bg-gray-100 text-gray-700"></span>
          <span id="chip-weight" class="text-xs font-semibold px-3 py-1.5 rounded-full bg-gray-100 text-gray-700"></span>
        </div>

        <!-- Notes -->
        <div id="notes-block" class="hidden bg-white rounded-2xl shadow-sm border border-gray-100 p-4 mb-5">
          <p class="text-xs font-bold text-gray-500 uppercase tracking-wide mb-2">Anotações</p>
          <p id="pet-notes" class="text-sm text-gray-600 leading-relaxed"></p>
        </div>

        <!-- Desktop 2-column grid -->
        <div class="lg:grid lg:grid-cols-2 lg:gap-6 space-y-6 lg:space-y-0">

          <!-- Vaccines section -->
          <section aria-labelledby="vac-heading">
            <div class="flex items-center justify-between mb-3">
              <h2 id="vac-heading" class="text-base font-bold text-gray-900">Vacinas</h2>
              <a id="add-vac-btn" href="#" class="text-xs font-bold text-white px-4 py-2 rounded-xl" style="background-color:#F97316;">
                Adicionar
              </a>
            </div>
            <div id="vac-list" class="space-y-3"></div>
            <div id="vac-empty" class="hidden text-center py-6 px-4 bg-white rounded-2xl border border-gray-100 shadow-sm">
              <p class="text-sm text-gray-400">Nenhuma vacina registrada.</p>
              <p class="text-xs text-gray-300 mt-1">Toque em "Adicionar" para registrar.</p>
            </div>
            <a id="vac-view-all" href="#" class="hidden mt-3 block text-center text-xs font-semibold text-orange-500 hover:underline">Ver todas as vacinas →</a>
          </section>

          <!-- Appointments section -->
          <section aria-labelledby="appt-heading">
            <div class="flex items-center justify-between mb-3">
              <h2 id="appt-heading" class="text-base font-bold text-gray-900">Consultas</h2>
              <a id="add-appt-btn" href="#" class="text-xs font-bold text-white px-4 py-2 rounded-xl" style="background-color:#F97316;">
                Adicionar
              </a>
            </div>
            <div id="appt-list" class="space-y-3"></div>
            <div id="appt-empty" class="hidden text-center py-6 px-4 bg-white rounded-2xl border border-gray-100 shadow-sm">
              <p class="text-sm text-gray-400">Nenhuma consulta agendada.</p>
            </div>
          </section>

        </div>
      </main>
    </div>

    <div id="bottom-nav"></div>

    <script src="shared.js"></script>
    <script>
      var petId = new URLSearchParams(window.location.search).get('id');
      var pet = null;
      var petIdx = -1;

      function loadProfile() {
        requireAuth();
        renderDesktopSidebar('pets');
        renderBottomNav('pets');

        var pets = getFaroPets();
        petIdx = pets.findIndex(function(p) { return p.id === petId; });
        if (petIdx === -1) { window.location.href = 'dashboard.html'; return; }
        pet = pets[petIdx];

        // Wire up "Adicionar" links to full-screen forms with petId pre-filled
        document.getElementById('add-vac-btn').href = 'add-vaccine.html?petId=' + encodeURIComponent(petId);
        document.getElementById('add-appt-btn').href = 'add-appointment.html?petId=' + encodeURIComponent(petId);
        var vacAll = document.getElementById('vac-view-all');
        vacAll.href = 'vaccines.html?petId=' + encodeURIComponent(petId);

        renderPet();
      }

      function renderPet() {
        var photoEl = document.getElementById('pet-photo');
        if (pet.photoUrl) {
          photoEl.src = pet.photoUrl;
          photoEl.classList.remove('hidden');
        }

        document.getElementById('pet-name').textContent = pet.name || 'Sem nome';
        document.getElementById('pet-subtitle').textContent = [pet.species, pet.breed].filter(Boolean).join(' · ');

        function setChip(id, val) {
          var el = document.getElementById(id);
          if (val) { el.textContent = val; } else { el.style.display = 'none'; }
        }
        setChip('chip-species', pet.species);
        setChip('chip-gender', pet.gender);
        setChip('chip-age', pet.age ? 'Idade: ' + pet.age : null);
        setChip('chip-weight', pet.weight ? pet.weight + ' kg' : null);

        if (pet.notes) {
          document.getElementById('notes-block').classList.remove('hidden');
          document.getElementById('pet-notes').textContent = pet.notes;
        }

        renderVaccines();
        renderAppts();
      }

      function renderVaccines() {
        var list = document.getElementById('vac-list');
        var empty = document.getElementById('vac-empty');
        var viewAll = document.getElementById('vac-view-all');
        var vaccines = pet.vaccines || [];
        if (vaccines.length === 0) { empty.classList.remove('hidden'); list.innerHTML = ''; viewAll.classList.add('hidden'); return; }
        empty.classList.add('hidden');
        var show = vaccines.slice(0, 3);
        list.innerHTML = show.map(function(v) {
          return buildVaccineListCard(Object.assign({}, v, { petId: pet.id, petName: pet.name }), false);
        }).join('');
        if (vaccines.length > 3) {
          viewAll.classList.remove('hidden');
          viewAll.textContent = 'Ver todas as ' + vaccines.length + ' vacinas →';
        } else {
          viewAll.classList.add('hidden');
        }
      }

      function renderAppts() {
        var list = document.getElementById('appt-list');
        var empty = document.getElementById('appt-empty');
        var appts = (pet.appointments || []).slice().sort(function(a, b) { return (a.date || '') < (b.date || '') ? -1 : 1; });
        if (appts.length === 0) { empty.classList.remove('hidden'); list.innerHTML = ''; return; }
        empty.classList.add('hidden');
        list.innerHTML = appts.map(function(a) {
          var today = todayStr();
          var isPast = (a.date || '') < today;
          var color = isPast ? '#9CA3AF' : '#F97316';
          return '<div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 flex items-start gap-3">' +
            '<div class="flex-shrink-0 w-10 h-10 rounded-xl flex items-center justify-center" style="background-color:' + (isPast ? '#F3F4F6' : '#FFF7ED') + ';">' +
              '<svg class="w-5 h-5" style="color:' + color + ';" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5"/></svg>' +
            '</div>' +
            '<div class="flex-1 min-w-0">' +
              '<p class="text-sm font-semibold text-gray-900 truncate">' + escapeHtml(a.title) + '</p>' +
              '<p class="text-xs text-gray-400 mt-0.5 truncate">' + escapeHtml(a.location || '') + '</p>' +
              '<p class="text-xs font-medium mt-1" style="color:' + color + ';">' + formatDate(a.date) + (a.time ? ' às ' + escapeHtml(a.time) : '') + '</p>' +
            '</div>' +
          '</div>';
        }).join('');
      }

      function confirmDelete() {
        if (confirm('Excluir ' + (pet.name || 'este pet') + ' e todo o histórico?')) {
          deleteFaroPetById(petId);
          window.location.href = 'dashboard.html';
        }
      }

      window.addEventListener('load', loadProfile);
    </script>
  </body>
</html>
