<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="img/iconWebLogo.png" type="image/png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Detalhe de Adoção - Faro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: { brand: { orange: '#F97316', 'orange-dark': '#EA580C', brown: '#451a03', 'brown-mid': '#7C3505', beige: '#FEF3C7', light: '#F4F4F0' } },
            fontFamily: { sans: ['Inter', 'sans-serif'] },
          },
        },
      };
    </script>
  </head>
  <body class="bg-brand-light font-sans text-gray-900 min-h-screen">

    <div id="desktop-sidebar"></div>

    <div class="lg:ml-64">

      <!-- Photo hero -->
      <div class="relative w-full" style="height:260px;background:linear-gradient(145deg,#A3510F,#7C3505);">
        <img id="detail-photo" class="w-full h-full object-cover hidden" alt="Foto do animal" />
        <div class="absolute inset-0" style="background:linear-gradient(to top,rgba(0,0,0,0.6) 0%,transparent 50%);"></div>
        <!-- Mobile back -->
        <a href="adoption.html" class="lg:hidden absolute top-12 left-5 w-10 h-10 rounded-full bg-white bg-opacity-90 flex items-center justify-center shadow" aria-label="Voltar">
          <svg class="w-5 h-5 text-gray-700" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
        </a>
        <!-- Desktop back -->
        <a href="adoption.html" class="hidden lg:flex absolute top-6 left-6 items-center gap-2 text-sm font-semibold text-white opacity-80 hover:opacity-100 transition-opacity">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
          Todos os animais
        </a>
        <!-- Name overlay -->
        <div class="absolute bottom-4 left-5 right-5">
          <h1 id="detail-name" class="text-2xl font-bold text-white leading-tight"></h1>
          <p id="detail-subtitle" class="text-sm text-white opacity-80 mt-0.5"></p>
        </div>
      </div>

      <main class="px-4 sm:px-5 lg:px-8 py-5 pb-32 lg:pb-10 max-w-4xl">

        <!-- Info chips -->
        <div id="chips-row" class="flex flex-wrap gap-2 mb-5"></div>

        <!-- Location -->
        <div id="location-row" class="hidden flex items-center gap-2 text-sm text-gray-500 mb-5">
          <svg class="w-4 h-4 flex-shrink-0" style="color:#F97316;" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z"/>
            <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z"/>
          </svg>
          <span id="detail-location" class="font-medium"></span>
        </div>

        <div class="lg:grid lg:grid-cols-2 lg:gap-6 space-y-5 lg:space-y-0">

          <!-- Left column -->
          <div class="space-y-4">

            <!-- Description -->
            <div id="desc-block" class="hidden bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
              <h2 class="text-xs font-bold text-gray-500 uppercase tracking-wide mb-2">Sobre</h2>
              <p id="detail-desc" class="text-sm text-gray-700 leading-relaxed"></p>
            </div>

            <!-- Health info -->
            <div id="health-block" class="hidden bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
              <div class="flex items-center gap-2 mb-3">
                <div class="w-8 h-8 rounded-xl flex items-center justify-center flex-shrink-0" style="background:#FFF7ED;">
                  <svg class="w-4 h-4" style="color:#F97316;" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/>
                  </svg>
                </div>
                <h2 class="text-sm font-bold text-gray-900">Saúde</h2>
              </div>
              <p id="detail-health" class="text-sm text-gray-600 leading-relaxed"></p>
            </div>

            <!-- Vaccination info -->
            <div id="vac-block" class="hidden bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
              <div class="flex items-center gap-2 mb-3">
                <div class="w-8 h-8 rounded-xl flex items-center justify-center flex-shrink-0" style="background:#FFF7ED;">
                  <svg class="w-4 h-4" style="color:#F97316;" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"/>
                  </svg>
                </div>
                <h2 class="text-sm font-bold text-gray-900">Vacinação</h2>
              </div>
              <p id="detail-vac" class="text-sm text-gray-600 leading-relaxed"></p>
            </div>

          </div>

          <!-- Right column -->
          <div class="space-y-4">

            <!-- Requirements -->
            <div id="req-block" class="hidden bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
              <div class="flex items-center gap-2 mb-3">
                <div class="w-8 h-8 rounded-xl flex items-center justify-center flex-shrink-0" style="background:#FEF3C7;">
                  <svg class="w-4 h-4" style="color:#7C3505;" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 002.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 00-1.123-.08m-5.801 0c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 00.75-.75 2.25 2.25 0 00-.1-.664m-5.8 0A2.251 2.251 0 0113.5 2.25H15c1.012 0 1.867.668 2.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25m0 0H4.875c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V9.375c0-.621-.504-1.125-1.125-1.125H8.25z"/>
                  </svg>
                </div>
                <h2 class="text-sm font-bold text-gray-900">Requisitos para adoção</h2>
              </div>
              <p id="detail-req" class="text-sm text-gray-600 leading-relaxed"></p>
            </div>

            <!-- Contact card -->
            <div id="contact-block" class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
              <h2 class="text-xs font-bold text-gray-500 uppercase tracking-wide mb-3">Responsável</h2>
              <div class="flex items-center gap-3 mb-4">
                <div class="w-10 h-10 rounded-full flex items-center justify-center flex-shrink-0" style="background:#FFF7ED;">
                  <svg class="w-5 h-5" style="color:#F97316;" fill="currentColor" viewBox="0 0 24 24">
                    <path fill-rule="evenodd" d="M7.5 6a4.5 4.5 0 119 0 4.5 4.5 0 01-9 0zM3.751 20.105a8.25 8.25 0 0116.498 0 .75.75 0 01-.437.695A18.683 18.683 0 0112 22.5c-2.786 0-5.433-.608-7.812-1.7a.75.75 0 01-.437-.695z" clip-rule="evenodd"/>
                  </svg>
                </div>
                <div>
                  <p id="contact-name" class="text-sm font-bold text-gray-900"></p>
                  <p id="contact-phone" class="text-xs text-gray-500 mt-0.5"></p>
                </div>
              </div>
              <div class="flex gap-3">
                <a id="btn-whatsapp" href="#" target="_blank" rel="noopener"
                  class="hidden flex-1 py-3 rounded-xl text-sm font-bold text-white text-center hover:opacity-90 transition-opacity"
                  style="background:#25D366;">
                  WhatsApp
                </a>
                <a id="btn-phone" href="#"
                  class="hidden flex-1 py-3 rounded-xl text-sm font-bold text-white text-center hover:opacity-90 transition-opacity"
                  style="background:#F97316;">
                  Ligar
                </a>
              </div>
            </div>

            <!-- Observations -->
            <div id="obs-block" class="hidden bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
              <h2 class="text-xs font-bold text-gray-500 uppercase tracking-wide mb-2">Observações</h2>
              <p id="detail-obs" class="text-sm text-gray-600 leading-relaxed"></p>
            </div>

          </div>
        </div>
      </main>
    </div>

    <div id="bottom-nav"></div>

    <script src="shared.js"></script>
    <script>
      var adoptionId = new URLSearchParams(window.location.search).get('id');

      function showBlock(id, textId, value) {
        if (value) {
          document.getElementById(id).classList.remove('hidden');
          document.getElementById(textId).textContent = value;
        }
      }

      window.addEventListener('load', function() {
        requireAuth();
        renderDesktopSidebar('adoption');
        renderBottomNav('adoption');

        var a = getFaroAdoptionById(adoptionId);
        if (!a) { window.location.href = 'adoption.html'; return; }

        var photo = document.getElementById('detail-photo');
        if (a.photos && a.photos[0]) {
          photo.src = a.photos[0];
          photo.classList.remove('hidden');
        }

        document.getElementById('detail-name').textContent = a.name || 'Sem nome';
        document.getElementById('detail-subtitle').textContent = [a.species, a.breed].filter(Boolean).join(' · ');

        // Chips
        var chips = '';
        var chipStyles = [
          { key: 'age',    bg: '#FFF7ED', color: '#EA580C' },
          { key: 'gender', bg: '#FEF3C7', color: '#7C3505' },
          { key: 'size',   bg: '#F3F4F6', color: '#374151' },
        ];
        chipStyles.forEach(function(c) {
          if (a[c.key]) chips += '<span class="text-xs font-semibold px-3 py-1.5 rounded-full" style="background:' + c.bg + ';color:' + c.color + ';">' + escapeHtml(a[c.key]) + '</span>';
        });
        if (a.species) chips += '<span class="text-xs font-semibold px-3 py-1.5 rounded-full bg-amber-100 text-amber-800">' + escapeHtml(a.species) + '</span>';
        document.getElementById('chips-row').innerHTML = chips;

        // Location
        var loc = [a.city, a.state ? (BR_STATE_NAMES[a.state] || a.state) : null].filter(Boolean).join(', ');
        if (loc) {
          document.getElementById('location-row').classList.remove('hidden');
          document.getElementById('detail-location').textContent = loc;
        }

        showBlock('desc-block',   'detail-desc',   a.description);
        showBlock('health-block', 'detail-health', a.healthInfo);
        showBlock('vac-block',    'detail-vac',    a.vaccinationInfo);
        showBlock('req-block',    'detail-req',    a.requirements);
        showBlock('obs-block',    'detail-obs',    a.observations);

        // Contact
        if (a.contactName) document.getElementById('contact-name').textContent = a.contactName;
        if (a.contactPhone) document.getElementById('contact-phone').textContent = a.contactPhone;

        var phoneRaw = (a.contactWhatsapp || a.contactPhone || '').replace(/\D/g, '');
        if (a.contactWhatsapp && phoneRaw) {
          var wa = document.getElementById('btn-whatsapp');
          wa.href = 'https://wa.me/55' + phoneRaw;
          wa.classList.remove('hidden');
        }
        if (a.contactPhone) {
          var ph = document.getElementById('btn-phone');
          ph.href = 'tel:' + a.contactPhone;
          ph.classList.remove('hidden');
        }
      });
    </script>
  </body>
</html>
