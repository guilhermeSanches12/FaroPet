<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="img/iconWebLogo.png" type="image/png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Menu - Faro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: { brand: { orange: '#F97316', 'orange-dark': '#EA580C', brown: '#451a03', 'brown-mid': '#7C3505', beige: '#FEF3C7', light: '#F4F4F0' } },
            fontFamily: { sans: ['Inter', 'sans-serif'] },
          },
        },
      };
    </script>
    <style>.blob-shape { border-radius: 42% 58% 65% 35% / 44% 38% 62% 56%; }</style>
  </head>
  <body class="bg-brand-light font-sans text-gray-900 min-h-screen">

    <div id="desktop-sidebar"></div>

    <div class="lg:ml-64">

      <!-- Top bar (mobile) -->
      <div class="lg:hidden relative overflow-hidden pt-12 pb-6 px-5" style="background-color:#7C3505;">
        <div class="blob-shape absolute -top-10 -right-10 w-40 h-40" style="background-color:#451a03;opacity:0.4;" aria-hidden="true"></div>
        <div class="relative z-10 flex items-center justify-between">
          <div>
            <p class="text-amber-300 text-xs font-medium">Menu</p>
            <h1 id="menu-user" class="text-xl font-bold text-white mt-0.5">Faro</h1>
          </div>
          <div class="w-12 h-12 rounded-xl overflow-hidden flex items-center justify-center" style="background-color:#F97316;">
            <img src="img/pawIcon.png" alt="" class="w-7 h-7 object-contain" style="filter:brightness(0) invert(1);" aria-hidden="true">
          </div>
        </div>
      </div>

      <!-- Desktop header -->
      <div class="hidden lg:flex bg-white border-b border-gray-100 shadow-sm items-center px-8 py-4">
        <div class="flex-1">
          <h1 class="text-2xl font-bold text-gray-900">Menu</h1>
          <p class="text-xs text-gray-400">Acesso rápido a todas as funcionalidades</p>
        </div>
        <div id="menu-user-desktop" class="text-sm font-semibold text-gray-700"></div>
      </div>

      <main class="px-4 sm:px-5 lg:px-8 py-5 pb-28 lg:pb-10 max-w-4xl">

        <!-- Quick actions grid -->
        <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4 mb-6">

          <a href="add-pet.html" class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5 flex flex-col items-center gap-2 text-center hover:shadow-md transition-shadow">
            <span class="w-12 h-12 rounded-xl flex items-center justify-center" style="background-color:#FFF7ED;">
              <svg class="w-6 h-6" style="color:#F97316;" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v6m3-3H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>

            <span class="w-12 h-12 rounded-xl flex items-center justify-center" style="background-color:#FFF7ED;">

            <span class="w-12 h-12 rounded-xl flex items-center justify-center" style="background-color:#FEF3C7;">
              <svg class="w-6 h-6" style="color:#7C3505;" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 002.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 00-1.123-.08m-5.801 0c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 00.75-.75 2.25 2.25 0 00-.1-.664m-5.8 0A2.251 2.251 0 0113.5 2.25H15c1.012 0 1.867.668 2.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25m0 0H4.875c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V9.375c0-.621-.504-1.125-1.125-1.125H8.25z"/></svg>
            </span>

          <a href="appointments.html" class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5 flex flex-col items-center gap-2 text-center hover:shadow-md transition-shadow">
            <span class="w-12 h-12 rounded-xl flex items-center justify-center" style="background-color:#FFF7ED;">

            </span>
            <span class="text-xs font-semibold text-gray-700">Consultas</span>
          </a>

          <a href="medicines.html" class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5 flex flex-col items-center gap-2 text-center hover:shadow-md transition-shadow">
            <span class="w-12 h-12 rounded-xl flex items-center justify-center" style="background-color:#FFF7ED;">
              <svg class="w-6 h-6" style="color:#F97316;" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9.75 3.104v5.714a2.25 2.25 0 01-.659 1.591L5 14.5M9.75 3.104c-.251.023-.501.05-.75.082m.75-.082a24.301 24.301 0 014.5 0m0 0v5.714c0 .597.237 1.17.659 1.591L19.8 15.3M14.25 3.104c.251.023.501.05.75.082M19.8 15.3l-1.57.393A9.065 9.065 0 0112 15a9.065 9.065 0 00-6.23-.693L5 14.5m14.8.8l1.402 1.402c1.232 1.232.65 3.318-1.067 3.611A48.309 48.309 0 0112 21c-2.773 0-5.491-.235-8.135-.687-1.718-.293-2.3-2.379-1.067-3.61L5 14.5"/></svg>

          <a href="clinics.html" class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5 flex flex-col items-center gap-2 text-center hover:shadow-md transition-shadow">
            <span class="w-12 h-12 rounded-xl flex items-center justify-center" style="background-color:#FFF7ED;">
              <svg class="w-6 h-6" style="color:#F97316;" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 21v-7.5a.75.75 0 01.75-.75h3a.75.75 0 01.75.75V21m-4.5 0H2.36m11.14 0H18m0 0h3.64m-1.39 0V9.349m-16.5 11.65V9.35m0 0a3.001 3.001 0 003.75-.615A2.993 2.993 0 009.75 9.75c.896 0 1.7-.393 2.25-1.016a2.993 2.993 0 002.25 1.016c.896 0 1.7-.393 2.25-1.015a3.001 3.001 0 003.75.614m-16.5 0a3.004 3.004 0 01-.621-4.72L4.318 3.44A1.5 1.5 0 015.378 3h13.243a1.5 1.5 0 011.06.44l1.19 1.189a3 3 0 01-.621 4.72m-13.5 8.65h3.75a.75.75 0 00.75-.75V13.5a.75.75 0 00-.75-.75H6.75a.75.75 0 00-.75.75v3.75c0 .415.336.75.75.75z"/></svg>
            </span>
            <span class="text-xs font-semibold text-gray-700">Clínicas</span>
          </a>

          <a href="notifications.html" class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5 flex flex-col items-center gap-2 text-center hover:shadow-md transition-shadow">
            <span class="w-12 h-12 rounded-xl flex items-center justify-center" style="background-color:#FFF7ED;">
              <svg class="w-6 h-6" style="color:#F97316;" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
            </span>
            <span class="text-xs font-semibold text-gray-700">Notificações</span>
          </a>
        </div>

        <!-- Profile and settings -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
          <a href="profile.html" class="flex items-center gap-4 px-5 py-4 border-b border-gray-50 hover:bg-gray-50 transition-colors">
            <span class="w-9 h-9 rounded-xl flex items-center justify-center" style="background-color:#FFF7ED;">
              <svg class="w-5 h-5" style="color:#F97316;" fill="currentColor" viewBox="0 0 24 24"><path fill-rule="evenodd" d="M7.5 6a4.5 4.5 0 119 0 4.5 4.5 0 01-9 0zM3.751 20.105a8.25 8.25 0 0116.498 0 .75.75 0 01-.437.695A18.683 18.683 0 0112 22.5c-2.786 0-5.433-.608-7.812-1.7a.75.75 0 01-.437-.695z" clip-rule="evenodd"/></svg>
            </span>
            <span class="flex-1 text-sm font-semibold text-gray-800">Meu perfil</span>
            <svg class="w-4 h-4 text-gray-300" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
          </a>
          <button onclick="confirmLogout()" class="w-full flex items-center gap-4 px-5 py-4 hover:bg-red-50 transition-colors text-left">
            <span class="w-9 h-9 rounded-xl flex items-center justify-center bg-red-50">
              <svg class="w-5 h-5 text-red-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75"/></svg>
            </span>
            <span class="text-sm font-semibold text-red-600">Sair da conta</span>
          </button>
        </div>

      </main>
    </div>

    <div id="bottom-nav"></div>

    <script src="shared.js"></script>
    <script>
      function confirmLogout() {
        if (confirm('Deseja sair da conta?')) {
          clearFaroUser();
          window.location.href = 'login.html';
        }
      }
      window.addEventListener('load', function() {
        requireAuth();
        renderDesktopSidebar('menu');
        renderBottomNav('menu');
        var user = getFaroUser();
        var name = user ? (user.name || 'Faro') : 'Faro';
        var mobileEl = document.getElementById('menu-user');
        var desktopEl = document.getElementById('menu-user-desktop');
        if (mobileEl) mobileEl.textContent = name;
        if (desktopEl) desktopEl.textContent = 'Olá, ' + name;
      });
    </script>
  </body>
</html>
