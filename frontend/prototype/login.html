<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="img/iconWebLogo.png" type="image/png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Entrar - Faro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: { orange: '#F97316', 'orange-dark': '#EA580C', brown: '#451a03', 'brown-mid': '#7C3505', beige: '#FEF3C7', light: '#F4F4F0' },
            },
            fontFamily: { sans: ['Inter', 'sans-serif'] },
          },
        },
      };
    </script>
    <style>
      .blob-shape { border-radius: 42% 58% 65% 35% / 44% 38% 62% 56%; }
    </style>
  </head>
  <body class="bg-brand-light font-sans text-gray-900 min-h-screen">
    <div class="min-h-screen flex flex-col md:flex-row">

      <!-- Visual panel — desktop only -->
      <div class="hidden md:flex w-1/2 relative overflow-hidden flex-col justify-center items-center p-12" style="background-color:#FEF3C7;">
        <div class="blob-shape absolute -top-20 -left-20 w-72 h-72 opacity-40" style="background-color:#F97316;"></div>
        <div class="blob-shape absolute -bottom-20 -right-10 w-60 h-60 opacity-30" style="background-color:#92400E;"></div>
        <div class="relative z-10 text-center max-w-md">
          <img src="img/FaroLogo.png" alt="Faro" class="mx-auto mb-6" style="height:48px;width:auto;">
          <p class="text-lg text-gray-600 leading-relaxed">A saúde do seu pet organizada em um lugar só. Vacinas, consultas e histórico sempre à mão.</p>
          <div class="mt-8 rounded-2xl overflow-hidden shadow-xl border-4 border-white" style="aspect-ratio:4/3;">
            <img src="https://images.unsplash.com/photo-1548199973-03cce0bbc87b?auto=format&fit=crop&w=600&q=80" alt="Pets felizes" class="w-full h-full object-cover"/>
          </div>
        </div>
      </div>

      <!-- Form panel -->
      <div class="w-full md:w-1/2 flex flex-col justify-center bg-white min-h-screen px-6 py-12 md:px-12 lg:px-16 relative overflow-hidden">
        <!-- Mobile top blob -->
        <div class="blob-shape absolute -top-12 -right-12 w-40 h-40 md:hidden" style="background-color:#7C3505;opacity:0.15;" aria-hidden="true"></div>

        <div class="w-full max-w-sm mx-auto relative z-10">
          <!-- Logo mobile -->
          <div class="md:hidden flex items-center justify-center mb-10">
            <img src="img/FaroLogo.png" alt="Faro" style="height:38px;width:auto;">
          </div>

          <div class="mb-8">
            <h1 class="text-2xl font-bold text-gray-900 mb-1">Bem-vindo de volta</h1>
            <p class="text-sm text-gray-500">Acesse o histórico de saúde do seu pet.</p>
          </div>

          <form id="login-form" onsubmit="handleLogin(event)" class="space-y-5">
            <div>
              <label for="email" class="block text-sm font-semibold text-gray-700 mb-1.5">E-mail</label>
              <input type="email" id="email" required placeholder="seu@email.com"
                class="w-full border border-gray-200 rounded-xl px-4 py-3.5 text-sm focus:outline-none focus:ring-2 bg-gray-50 transition"
                style="--tw-ring-color:#F97316;" onfocus="this.style.borderColor='#F97316'" onblur="this.style.borderColor=''" />
            </div>
            <div>
              <div class="flex justify-between items-center mb-1.5">
                <label for="password" class="block text-sm font-semibold text-gray-700">Senha</label>
                <a href="#" class="text-xs font-medium hover:underline" style="color:#F97316;">Esqueceu a senha?</a>
              </div>
              <div class="relative">
                <input type="password" id="password" required placeholder="••••••••"
                  class="w-full border border-gray-200 rounded-xl px-4 py-3.5 text-sm focus:outline-none bg-gray-50 pr-12 transition"
                  onfocus="this.style.borderColor='#F97316'" onblur="this.style.borderColor=''" />
                <button type="button" onclick="togglePwd('password','eye-login')" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                  <svg id="eye-login" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                </button>
              </div>
            </div>

            <div id="login-error" class="hidden text-sm text-red-600 bg-red-50 rounded-xl px-4 py-3"></div>

            <button type="submit" class="w-full text-white font-bold py-3.5 rounded-xl shadow-sm transition-opacity hover:opacity-90 mt-2" style="background-color:#F97316;">
              Entrar
            </button>
          </form>

          <div class="mt-8 text-center">
            <p class="text-sm text-gray-500">
              Não tem conta?
              <a href="register.html" class="font-semibold hover:underline ml-1" style="color:#F97316;">Criar uma conta</a>
            </p>
          </div>

          <div class="mt-4 text-center">
            <a href="index.html" class="text-xs text-gray-400 hover:underline">Voltar ao início</a>
          </div>
        </div>
      </div>
    </div>

    <script src="shared.js"></script>
    <script>
      function togglePwd(inputId, iconId) {
        var input = document.getElementById(inputId);
        input.type = input.type === 'password' ? 'text' : 'password';
      }

      function handleLogin(e) {
        e.preventDefault();
        var email = document.getElementById('email').value.trim();
        var password = document.getElementById('password').value;
        var errDiv = document.getElementById('login-error');
        errDiv.classList.add('hidden');

        // Look up user
        var user = getFaroUser();
        if (user && user.email === email) {
          window.location.href = 'dashboard.html';
          return;
        }
        // Demo: any credentials create a session
        if (!user) {
          saveFaroUser({ id: Date.now().toString(), name: email.split('@')[0], email: email });
          window.location.href = 'dashboard.html';
          return;
        }
        errDiv.textContent = 'E-mail ou senha incorretos.';
        errDiv.classList.remove('hidden');
      }

      window.addEventListener('load', function() {
        // Already logged in → redirect
        if (getFaroUser()) window.location.href = 'dashboard.html';
      });
    </script>
  </body>
</html>
